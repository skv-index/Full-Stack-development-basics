<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f8f9fa;
}
.card{
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<header class="bg-primary text-white text-center py-3">
    <h1>Inventory Management System</h1>
</header>

<div class="container mt-4">

    <div class="card p-4 mb-4">
        <h3>Add / Update Product</h3>

        <input type="hidden" id="editIndex">

        <div class="row">
            <div class="col-md-3 mb-2">
                <input type="text" id="productId" class="form-control" placeholder="Product ID">
            </div>

            <div class="col-md-4 mb-2">
                <input type="text" id="productName" class="form-control" placeholder="Product Name">
            </div>

            <div class="col-md-3 mb-2">
                <select id="productStatus" class="form-select">
                    <option>In Stock</option>
                    <option>Low Stock</option>
                    <option>Out of Stock</option>
                </select>
            </div>

            <div class="col-md-2 mb-2">
                <button class="btn btn-success w-100" onclick="saveProduct()">
                    Save
                </button>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <h3>Inventory List</h3>

        <table class="table table-bordered table-hover mt-3">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Product Name</th>
                    <th>Status</th>
                    <th width="180">Actions</th>
                </tr>
            </thead>

            <tbody id="productTable">
            </tbody>
        </table>
    </div>

</div>

<script>

let products = [
    {
        id:"101",
        name:"Wireless Mouse",
        status:"In Stock"
    },
    {
        id:"102",
        name:"Keyboard",
        status:"Low Stock"
    }
];

function displayProducts(){

    let table = document.getElementById("productTable");

    table.innerHTML = "";

    products.forEach((product,index)=>{

        let badgeClass="bg-success";

        if(product.status==="Low Stock"){
            badgeClass="bg-warning text-dark";
        }

        if(product.status==="Out of Stock"){
            badgeClass="bg-danger";
        }

        table.innerHTML += `
        <tr>
            <td>${product.id}</td>
            <td>${product.name}</td>
            <td>
                <span class="badge ${badgeClass}">
                    ${product.status}
                </span>
            </td>

            <td>
                <button class="btn btn-primary btn-sm"
                    onclick="editProduct(${index})">
                    Edit
                </button>

                <button class="btn btn-danger btn-sm"
                    onclick="deleteProduct(${index})">
                    Delete
                </button>
            </td>
        </tr>
        `;
    });
}

function saveProduct(){

    let id = document.getElementById("productId").value;
    let name = document.getElementById("productName").value;
    let status = document.getElementById("productStatus").value;

    if(id==="" || name===""){
        alert("Please fill all fields");
        return;
    }

    let editIndex = document.getElementById("editIndex").value;

    if(editIndex===""){

        products.push({
            id:id,
            name:name,
            status:status
        });

    }else{

        products[editIndex] = {
            id:id,
            name:name,
            status:status
        };
    }

    clearForm();
    displayProducts();
}

function editProduct(index){

    document.getElementById("productId").value =
        products[index].id;

    document.getElementById("productName").value =
        products[index].name;

    document.getElementById("productStatus").value =
        products[index].status;

    document.getElementById("editIndex").value =
        index;
}

function deleteProduct(index){

    if(confirm("Delete this product?")){

        products.splice(index,1);

        displayProducts();
    }
}

function clearForm(){

    document.getElementById("productId").value="";
    document.getElementById("productName").value="";
    document.getElementById("productStatus").value="In Stock";
    document.getElementById("editIndex").value="";
}

displayProducts();

</script>

</body>
</html>
